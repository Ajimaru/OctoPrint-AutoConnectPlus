name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create a GitHub Release

jobs:
  # Build the wheel and verify it imports against both OctoPrint generations:
  # 1.x (serial-only fallback path) and 2.x (connector framework path).
  smoke:
    name: Smoke-test (OctoPrint ${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyPI "latest stable" is still the 1.x line; pin it explicitly.
          # This is the gating leg: a failure here blocks the release.
          - label: "1.x"
            octoprint: "OctoPrint>=1.11,<2"
            pre: ""
            blocking: true
          # 2.0 is only published as a prerelease for now, so allow --pre.
          # Non-blocking: OctoPrint 2.0.0rc* still has a circular-import bug
          # (octoprint.printer <-> octoprint.filemanager) that breaks a bare
          # `import` outside a running server. Keep testing it for visibility,
          # but don't let the unstable rc block releases. Flip to blocking once
          # 2.0 stable is out.
          - label: "2.x"
            octoprint: "OctoPrint>=2.0.0rc1"
            pre: "--pre"
            blocking: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Smoke-test the built wheel
        # Non-blocking legs (matrix.blocking == false) report failures without
        # failing the job, so the release's `needs: smoke` still succeeds.
        continue-on-error: ${{ !matrix.blocking }}
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          # OctoPrint provides the runtime deps (pyserial, octoprint.*) that the
          # plugin imports; install the matrix version so the import check is
          # meaningful for that generation.
          /tmp/smoke/bin/pip install ${{ matrix.pre }} "${{ matrix.octoprint }}"
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import octoprint_autoconnectplus; print('import OK')"
          /tmp/smoke/bin/python -c "from importlib.metadata import version; print('installed version', version('OctoPrint-AutoConnectPlus'))"

  release:
    name: Build and release
    runs-on: ubuntu-latest
    needs: smoke # only publish once both OctoPrint generations pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Resolve versions
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Normalize PEP 440: a git tag like v0.1.0-rc1 maps to 0.1.0rc1.
          norm_tag="$(echo "$tag" | sed -E 's/-(a|b|c|rc|alpha|beta|dev|post)/\1/I')"
          # Read the version straight from pyproject.toml. Avoid tomllib (only
          # in the stdlib on Python 3.11+; this job runs on 3.9). The version is
          # a simple top-level `version = "..."` line, so grep it out.
          pkg="$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/.*=[[:space:]]*["'"'"']([^"'"'"']+)["'"'"'].*/\1/')"
          if [ -z "$pkg" ]; then
            echo "::error::Could not parse version from pyproject.toml"
            exit 1
          fi
          echo "tag=$tag"            >> "$GITHUB_OUTPUT"
          echo "norm_tag=$norm_tag"  >> "$GITHUB_OUTPUT"
          echo "pkg=$pkg"            >> "$GITHUB_OUTPUT"
          # Mark RC/alpha/beta/dev tags as prereleases.
          if echo "$pkg" | grep -qiE '(a|b|c|rc|alpha|beta|dev)[0-9]*$'; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches pyproject version
        run: |
          if [ "${{ steps.ver.outputs.norm_tag }}" != "${{ steps.ver.outputs.pkg }}" ]; then
            echo "::error::Tag ${{ steps.ver.outputs.tag }} (normalized ${{ steps.ver.outputs.norm_tag }}) does not match pyproject version ${{ steps.ver.outputs.pkg }}"
            exit 1
          fi
          echo "OK: tag matches pyproject version ${{ steps.ver.outputs.pkg }}"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Build versionless source archive
        run: |
          # Stable, version-independent filename so a single URL can always
          # point at the newest release (see the rolling "latest" release below).
          git archive --format=zip --prefix=OctoPrint-AutoConnectPlus/ \
            -o dist/OctoPrint-AutoConnectPlus-latest.zip "$GITHUB_REF_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/OctoPrint-AutoConnectPlus-latest.zip

      # Maintain a rolling "latest" release whose source-zip URL never changes:
      #   .../releases/download/latest/OctoPrint-AutoConnectPlus-latest.zip
      # Unlike GitHub's /releases/latest, this is updated on EVERY tag push,
      # so it tracks prereleases (rc/beta) too.
      - name: Update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest
          tag_name: latest
          prerelease: ${{ steps.ver.outputs.prerelease }}
          body: |
            Rolling pointer to the most recent release (**${{ github.ref_name }}**),
            including prereleases. The asset URL below is stable across versions:

            ```
            https://github.com/${{ github.repository }}/releases/download/latest/OctoPrint-AutoConnectPlus-latest.zip
            ```
          files: |
            dist/OctoPrint-AutoConnectPlus-latest.zip
