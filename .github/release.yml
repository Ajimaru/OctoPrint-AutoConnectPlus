changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: ✨ Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🌍 Translations
      labels:
        - i18n
        - translation
    - title: 📖 Documentation
      labels:
        - documentation
    - title: 🔧 Maintenance
      labels:
        - chore
        - dependencies
    - title: Other Changes
      labels:
        - "*"
